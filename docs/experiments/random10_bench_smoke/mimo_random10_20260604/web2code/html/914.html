<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Home Decor Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 40px 10%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #111;
        }

        .product-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .product-card {
            border: 1px solid #ccc;
            padding: 10px;
            width: calc(33.333% - 14px);
            box-sizing: border-box;
            background-color: transparent;
        }

        .product-image {
            width: 100%;
            height: 60px; /* Approximating the small image height in screenshot */
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #555;
            border: 1px solid #eee;
            background-color: #fff;
        }

        .product-title {
            font-size: 12px;
            color: #333;
        }

        .shop-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .shop-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>Welcome to Our Modern Home Decor Store</h1>

    <div class="product-grid">
        <div class="product-card">
            <div class="product-image" style="background: linear-gradient(to right, #e9ecef, #dee2e6);">
                <span>Boho Fringe Pillow</span>
            </div>
            <div class="product-title">Boho Fringe Pillow</div>
        </div>
        <div class="product-card">
            <div class="product-image" style="background: linear-gradient(to right, #dee2e6, #ced4da);">
                <span>Nature-Inspired Wall Art</span>
            </div>
            <div class="product-title">Nature-Inspired Wall Art</div>
        </div>
        <div class="product-card">
            <div class="product-image" style="background: linear-gradient(to right, #ced4da, #adb5bd);">
                <span>Minimalist Marble Vase</span>
            </div>
            <div class="product-title">Minimalist Marble Vase</div>
        </div>
    </div>

    <button class="shop-btn">Shop Now</button>

    <script>
        // Basic interaction for button
        document.querySelector('.shop-btn').addEventListener('click', function() {
            alert('Thank you for visiting the store!');
        });
    </script>

</body>
</html>
