<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Movies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            align-items: center;
            padding: 0 40px;
            height: 60px;
            background-color: #000000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            width: 150px;
            height: 50px;
            background-color: #ffff00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: #000;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            margin-left: 40px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            padding: 18px 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .nav-links a.active {
            border-bottom: 2px solid #00ffff;
            color: #00ffff;
        }

        .nav-links a:hover {
            color: #00ffff;
        }

        .search-container {
            margin-left: auto;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 200px;
            height: 40px;
            padding: 0 15px;
            background-color: #333;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .search-button {
            width: 40px;
            height: 40px;
            background-color: #ffff00;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-button svg {
            width: 20px;
            height: 20px;
        }

        /* Hero Banner */
        .hero-banner {
            height: 300px;
            background: linear-gradient(to right, #000066, #000033);
            position: relative;
        }

        /* Content Section */
        .content {
            padding: 60px 40px;
            background-color: #121212;
        }

        .section-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Movie Card */
        .movie-card {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background-color: #0000ff;
            position: relative;
            border-radius: 4px;
        }

        .rating-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }

        .rating-badge::before {
            content: "★";
            font-size: 12px;
        }

        .movie-info {
            padding: 15px 5px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .movie-details {
            flex: 1;
        }

        .movie-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .movie-year {
            font-size: 14px;
            color: #aaaaaa;
        }

        /* Favorite Button and Tooltip */
        .favorite-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #aaaaaa;
            position: relative;
            padding: 0 10px;
            transition: color 0.2s;
        }

        .favorite-btn:hover {
            color: #e74c3c;
        }

        .favorite-btn.active {
            color: #e74c3c;
        }

        .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        .favorite-btn:hover .tooltip {
            opacity: 1;
        }

        /* Fixed UI Elements */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .back-to-top:hover {
            background-color: #777;
        }

        .back-to-top svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .theme-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;
            height: 30px;
            background-color: #333;
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 0 5px;
            cursor: pointer;
        }

        .toggle-circle {
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .theme-toggle.active .toggle-circle {
            transform: translateX(30px);
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">MOVIE</div>
        <div class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">Trending</a>
            <a href="#">Discover</a>
            <a href="#">TV Shows</a>
            <a href="#">People</a>
            <a href="#">Genres</a>
            <a href="#">Favorites</a>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search">
            <button class="search-button">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Hero Banner -->
    <div class="hero-banner"></div>

    <!-- Main Content -->
    <div class="content">
        <h1 class="section-title">Upcoming Movies</h1>
        
        <div class="movie-grid">
            <!-- Movie 1: Nosferatu -->
            <div class="movie-card">
                <div class="movie-poster">
                    <div class="rating-badge">6.7</div>
                </div>
                <div class="movie-info">
                    <div class="movie-details">
                        <div class="movie-title">Nosferatu</div>
                        <div class="movie-year">2024</div>
                    </div>
                    <button class="favorite-btn active">
                        ♥
                        <span class="tooltip">Add To Favorites</span>
                    </button>
                </div>
            </div>
            
            <!-- Movie 2: Werewolves -->
            <div class="movie-card">
                <div class="movie-poster">
                    <div class="rating-badge">6.4</div>
                </div>
                <div class="movie-info">
                    <div class="movie-details">
                        <div class="movie-title">Werewolves</div>
                        <div class="movie-year">2024</div>
                    </div>
                    <button class="favorite-btn">
                        ♡
                        <span class="tooltip">Add To Favorites</span>
                    </button>
                </div>
            </div>
            
            <!-- Movie 3: Memoir of a Snail -->
            <div class="movie-card">
                <div class="movie-poster">
                    <div class="rating-badge">7.9</div>
                </div>
                <div class="movie-info">
                    <div class="movie-details">
                        <div class="movie-title">Memoir of a Snail</div>
                        <div class="movie-year">2024</div>
                    </div>
                    <button class="favorite-btn">
                        ♡
                        <span class="tooltip">Add To Favorites</span>
                    </button>
                </div>
            </div>
            
            <!-- Movie 4: Straume -->
            <div class="movie-card">
                <div class="movie-poster">
                    <div class="rating-badge">8.4</div>
                </div>
                <div class="movie-info">
                    <div class="movie-details">
                        <div class="movie-title">Straume</div>
                        <div class="movie-year">2024</div>
                    </div>
                    <button class="favorite-btn">
                        ♡
                        <span class="tooltip">Add To Favorites</span>
                    </button>
                </div>
            </div>
            
            <!-- Movie 5: Alarum -->
            <div class="movie-card">
                <div class="movie-poster">
                    <div class="rating-badge">6.1</div>
                </div>
                <div class="movie-info">
                    <div class="movie-details">
                        <div class="movie-title">Alarum</div>
                        <div class="movie-year">2025</div>
                    </div>
                    <button class="favorite-btn">
                        ♡
                        <span class="tooltip">Add To Favorites</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed UI Elements -->
    <div class="back-to-top">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
        </svg>
    </div>
    
    <div class="theme-toggle">
        <div class="toggle-circle"></div>
    </div>

    <script>
        // Favorite button functionality
        document.querySelectorAll('.favorite-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.toggle('active');
                this.innerHTML = this.classList.contains('active') 
                    ? '♥<span class="tooltip">Add To Favorites</span>' 
                    : '♡<span class="tooltip">Add To Favorites</span>';
            });
        });
    </script>
</body>
</html>
