<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graham Llewellyn Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #4d4d4d;
            color: white;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 50px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            padding-left: 50px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 20px;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-size: 38px;
            margin-bottom: 20px;
            color: #000;
        }

        .blue-image-placeholder {
            width: 70%;
            max-width: 800px;
            height: 300px;
            background-color: blue;
            margin: 0 auto;
        }

        /* Footer */
        .footer {
            background-color: #4d4d4d;
            color: white;
            padding: 15px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <header class="navbar">
        <a href="#" class="logo">Graham Llewellyn Art</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Gallery</a>
            <a href="#">Links</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <section class="welcome-section">
            <h1 class="welcome-title">Welcome</h1>
            <div class="blue-image-placeholder"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        Powered by Clikpic
    </footer>
</body>
</html>
