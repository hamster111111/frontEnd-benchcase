<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRobotLab Forum</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            background-color: #f5f5f5;
        }

        #root {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 60px;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 40px;
            flex-shrink: 0;
        }

        .sidebar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sidebar-icon {
            width: 30px;
            height: 30px;
            background: #00a6ed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .sidebar-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 12px;
            color: #ccc;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            overflow-y: auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 80px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            width: 80px;
            height: 50px;
            background: blue;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .logo-text {
            font-size: 28px;
            font-weight: bold;
            color: #00a6ed;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }

        .nav-links a:hover {
            color: #00a6ed;
        }

        .login-area a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            border-left: 1px solid #ccc;
            padding-left: 20px;
        }

        .content-area {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 40px;
            background: white;
            width: 100%;
        }

        .breadcrumbs {
            font-size: 14px;
            margin-bottom: 30px;
            color: #666;
        }

        .breadcrumbs a {
            color: #00a6ed;
            text-decoration: none;
        }

        .breadcrumbs span {
            margin: 0 10px;
            color: #999;
        }

        .post {
            margin-bottom: 40px;
            color: #444;
            font-size: 15px;
            line-height: 1.6;
        }

        .divider {
            border: 0;
            border-top: 1px solid #eee;
            margin: 30px 0;
        }

        .reply {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: #e0e0e0;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .reply-content {
            flex: 1;
        }

        .user-info {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 5px;
        }

        .username {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .timestamp {
            color: #999;
            font-size: 13px;
        }

        .reply-title {
            color: #00a6ed;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
            display: block;
            text-decoration: none;
        }

        .reply-title:hover {
            text-decoration: underline;
        }

        .replies-header {
            font-weight: bold;
            margin: 30px 0 20px 0;
        }

        .nested-reply {
            margin-left: 70px;
        }

        .footer-text {
            margin-top: 40px;
            font-size: 14px;
            color: #666;
        }

        .footer-text a {
            color: #00a6ed;
            text-decoration: none;
        }

        .site-footer {
            height: 250px;
            background: #222;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div style={{ display: 'flex', height: '100vh' }}>
                    <Sidebar />
                    <div className="main-content">
                        <Header />
                        <div className="content-area">
                            <div className="breadcrumbs">
                                <a href="#">Home</a> <span>›</span> <a href="#">Forums</a>
                            </div>
                            
                            <div className="post">
                                <p>Hi,</p>
                                <p>When I start an Arduino runtime service in MyRobotLab I am given the option of opening it in Arduino IDE. I have an up-to-date version of Arduino IDE on my Macbook Air running MacOS Mohave 10.14.2 but MyRobotLab doesn't seem to be able to find it even when I browse to the Applications folder where it is.</p>
                                <p>Any help would be appreciated.</p>
                                <p>Chris</p>
                            </div>
                            
                            <hr className="divider" />
                            
                            <div className="reply">
                                <div className="avatar"></div>
                                <div className="reply-content">
                                    <div className="user-info">
                                        <span className="username">kwatters</span>
                                        <span className="timestamp">4 years 9 months ago</span>
                                    </div>
                                    <a href="#" className="reply-title">Manually Upload the sketch</a>
                                    <div className="post">
                                        <p>Hi Chris,</p>
                                        <p>The integration from MRL to the Arduino IDE is pretty loose at this time. I recommend just opening up the Arduino IDE and loading the MrComm.ino sketch directly to the Arduino that you are using.</p>
                                        <p>Make sure to use an Arduino IDE version 1.6.8 or newer.</p>
                                        <p>The MrComm.ino should be in the MRL_DIR/resource/Arduino/MrlComm directory. All you need to do is open the MrComm.ino there and upload it.</p>
                                        <p>Good luck & welcome!</p>
                                        <p>-Kevin</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="replies-header">Replies -</div>
                            
                            <div className="nested-reply">
                                <div className="reply">
                                    <div className="avatar"></div>
                                    <div className="reply-content">
                                        <div className="user-info">
                                            <span className="username">Chris_Veal</span>
                                            <span className="timestamp">4 years 9 months ago</span>
                                        </div>
                                        <a href="#" className="reply-title">Manual upload of MRLcomm.ino</a>
                                        <div className="post">
                                            <p>Kevin,</p>
                                            <p>Many thanks, I have done that and it seemed to work ok - I opened the MRLcomm.ino file from Arduino IDE and then uploaded it (couple of warnings but that's all). I now need to learn enough to try and communicate with the Arduino from MyRobotLab.</p>
                                            <p>Thanks again for your help.</p>
                                            <p>Chris</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="footer-text">
                                <a href="#">Getting Started</a>
                                <p style={{marginTop: '20px', color: '#999'}}>
                                    <a href="#">Log in</a> or <a href="#">register</a> to post comments
                                </p>
                            </div>
                        </div>
                        <div className="site-footer"></div>
                    </div>
                </div>
            );
        }

        function Sidebar() {
            return (
                <div className="sidebar">
                    <div className="sidebar-item">
                        <div className="sidebar-icon">M</div>
                        <span className="sidebar-text">MyRobotLab</span>
                    </div>
                    <div className="sidebar-item">
                        <div className="sidebar-icon">D</div>
                        <span className="sidebar-text">Discord</span>
                    </div>
                    <div className="sidebar-item">
                        <div className="sidebar-icon">N</div>
                        <span className="sidebar-text">Nixie</span>
                    </div>
                    <div className="sidebar-item">
                        <div className="sidebar-icon">L</div>
                        <span className="sidebar-text">Latest Version</span>
                    </div>
                </div>
            );
        }

        function Header() {
            return (
                <div className="header">
                    <div className="logo-area">
                        <div className="logo-box">M</div>
                        <span className="logo-text">MyRobotLab</span>
                    </div>
                    <div className="nav-links">
                        <a href="#">Documentation</a>
                        <a href="#">Download</a>
                        <a href="#">FAQs</a>
                        <a href="#">Forums</a>
                    </div>
                    <div className="login-area">
                        <a href="#">Log in</a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
