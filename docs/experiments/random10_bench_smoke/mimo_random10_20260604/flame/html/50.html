<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Speed Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .speed-display {
            border: 1px solid #d0d0d0;
            padding: 20px 40px;
            margin-bottom: 25px;
            text-align: center;
            background-color: #ffffff;
            border-radius: 4px;
        }
        
        .speed-text {
            font-size: 24px;
            color: #1a1a1a;
            line-height: 1.4;
            font-weight: 400;
        }
        
        .test-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 500;
        }
        
        .test-button:hover {
            background-color: #45a049;
        }
        
        .test-button:active {
            background-color: #3d8b40;
        }
        
        .test-button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .speed-display.testing {
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        function SpeedTestApp() {
            const [downloadSpeed, setDownloadSpeed] = React.useState(0);
            const [uploadSpeed, setUploadSpeed] = React.useState(0);
            const [isTesting, setIsTesting] = React.useState(false);

            const simulateSpeedTest = () => {
                if (isTesting) return;
                
                setIsTesting(true);
                setDownloadSpeed(0);
                setUploadSpeed(0);
                
                // Simulate download speed test
                let downloadProgress = 0;
                const downloadInterval = setInterval(() => {
                    downloadProgress += Math.random() * 5 + 1;
                    if (downloadProgress >= 100) {
                        clearInterval(downloadInterval);
                        setDownloadSpeed(Math.floor(Math.random() * 50 + 10));
                        
                        // Start upload test after download
                        setTimeout(() => {
                            let uploadProgress = 0;
                            const uploadInterval = setInterval(() => {
                                uploadProgress += Math.random() * 4 + 0.5;
                                if (uploadProgress >= 100) {
                                    clearInterval(uploadInterval);
                                    setUploadSpeed(Math.floor(Math.random() * 20 + 5));
                                    setIsTesting(false);
                                } else {
                                    setUploadSpeed(Math.floor((uploadProgress / 100) * (Math.random() * 15 + 3)));
                                }
                            }, 50);
                        }, 500);
                    } else {
                        setDownloadSpeed(Math.floor((downloadProgress / 100) * (Math.random() * 60 + 15)));
                    }
                }, 50);
            };

            return (
                <React.Fragment>
                    <div className={`speed-display ${isTesting ? 'testing' : ''}`}>
                        <div className="speed-text">
                            download speed: {downloadSpeed} Mbps<br />
                            upload speed: {uploadSpeed} Mbps
                        </div>
                    </div>
                    <button 
                        className="test-button"
                        onClick={simulateSpeedTest}
                        disabled={isTesting}
                    >
                        test internet speed
                    </button>
                </React.Fragment>
            );
        }

        ReactDOM.render(<SpeedTestApp />, document.getElementById('root'));
    </script>
</body>
</html>
