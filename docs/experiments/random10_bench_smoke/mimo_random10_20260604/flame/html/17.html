<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Registration</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fce4ec;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: center;
        }

        .input-field {
            width: 60%;
            padding: 12px 16px;
            border: 1px solid #c2185b;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            color: #333;
            display: block;
            margin: 0 auto;
        }

        .input-field::placeholder {
            color: #666;
        }

        .checkbox-group {
            margin: 30px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 40px;
            padding: 0 20px;
            max-width: 70%;
            margin-left: auto;
            margin-right: auto;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #c2185b;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .checkbox-label input {
            accent-color: #c2185b;
            width: 16px;
            height: 16px;
        }

        .submit-btn {
            display: block;
            width: 200px;
            margin: 20px auto 0;
            padding: 14px;
            background-color: #b71c56;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #d81b60;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-group">
            <input type="text" class="input-field" placeholder="name">
        </div>
        <div class="form-group">
            <input type="tel" class="input-field" placeholder="phone">
        </div>
        <div class="form-group">
            <input type="email" class="input-field" placeholder="email">
        </div>
        
        <div class="checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox">
                art workshop
            </label>
            <label class="checkbox-label">
                <input type="checkbox">
                tech workshop
            </label>
            <label class="checkbox-label">
                <input type="checkbox">
                business workshop
            </label>
        </div>

        <button class="submit-btn">Submit registration</button>
    </div>
</body>
</html>
