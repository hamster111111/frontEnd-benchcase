<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>前端 Benchmark 资料入口</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #647084;
        --line: #d9dfeb;
        --accent: #2457d6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(980px, calc(100% - 40px));
        margin: 0 auto;
        padding: 56px 0;
      }
      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }
      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
      }
      .lead {
        margin: 14px 0 28px;
        max-width: 680px;
        color: var(--muted);
        line-height: 1.7;
      }
      .entry-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .entry {
        min-height: 190px;
        padding: 22px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
      }
      .entry:hover {
        border-color: var(--accent);
      }
      .entry h2 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      .entry p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .entry span {
        margin-top: 24px;
        color: var(--accent);
        font-weight: 700;
      }
      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 980px);
          padding: 32px 0;
        }
        .entry-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">前端设计评测</p>
      <h1>Benchmark 资料入口</h1>
      <p class="lead">这里保留两类页面：一个是调研阶段收集的 benchmark / framework / 模型资料库，一个是我们已经跑过的实验看板。</p>
      <section class="entry-grid" aria-label="页面入口">
        <a class="entry" href="./web/index.html">
          <div>
            <h2>Benchmark 资料库</h2>
            <p>整理 Zhipu / GLM、其他模型、可跑 framework、评分方式、论文信息和调研来源。</p>
          </div>
          <span>打开资料库</span>
        </a>
        <a class="entry" href="./web/benchmark-board.html">
          <div>
            <h2>已跑 Benchmark 看板</h2>
            <p>展示 random-10 smoke run、VLM judge 分数、低分样例和已跑实验进度。</p>
          </div>
          <span>打开看板</span>
        </a>
      </section>
    </main>
  </body>
</html>
